app = "agentmeets"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  CORS_ORIGINS = "https://innies.live,https://www.innies.live"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "agentmeets_data"
  destination = "/data"
